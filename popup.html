<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1c1d1f;
      margin: 0;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #0d9488;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }
    .status {
      margin-top: 8px;
      font-size: 11px;
      color: #6a6f73;
    }
  </style>
</head>
<body>
  <h3>Udemy Auto-Hide</h3>
  <label>
    <span class="toggle">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </span>
    <span id="label">Enabled</span>
  </label>
  <div class="status">Hides controls &amp; cursor after 2.5s of inactivity while video plays.</div>
  <script src="popup.js"></script>
</body>
</html>
